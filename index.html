

<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lamp Toggle Login — Working</title>
</head>

<body>

  <!-- hidden switch first so we can target the whole wrap with "~" -->
  <input id="switch" type="checkbox" />

  <div class="wrap">
    <div class="left">
      <form class="login-form" action="#" onsubmit="return false;">
        <h2>Member Login</h2>
        <input type="text" placeholder="Username" autocomplete="username" />
        <input type="password" placeholder="Password" autocomplete="current-password" />
        <button type="submit">Sign in</button>
      </form>
    </div>

    <div class="right">
      <!-- glow area covers right half for soft light -->
      <div class="glow" aria-hidden="true"></div>

      <!-- clicking this label toggles #switch -->
      <label for="switch" class="lamp-label" aria-hidden="false">
        <div class="lamp" role="button" aria-pressed="false" tabindex="0">
          <div class="lamp-bulb" aria-hidden="true">
            <div class="filament"></div>
          </div>
          <div class="neck"></div>
          <div class="base"></div>
          <div class="lamp-caption">Lamp (click)</div>
        </div>
      </label>
    </div>
  </div>
</body>

</html>
<style>
    :root {
  --bg: #0f1113;
  --panel: #1f272b;
  --muted: #bfc7cb;
  --accent: #ffd54a;
}
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, #081018 0%, #0f1113 100%);
  font-family: Inter, system-ui, Arial, sans-serif;
  color: var(--muted);
}

/* Hidden checkbox placed BEFORE layout so we can use general sibling selectors */
#switch {
  display: none;
}

.wrap {
  width: 820px;
  max-width: 95vw;
  height: 420px;
  border-radius: 18px;
  background: var(--panel);
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
  overflow: hidden;
  display: flex;
  position: relative;
}

/* Left = form area, Right = lamp area */
.left,
.right {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 36px;
}

.left {
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent);
}

.right {
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.01), transparent);
}

/* lamp container is inside label so clicking it toggles the checkbox */
.lamp-label {
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  width: 160px;
  height: 320px;
  user-select: none;
}

.lamp {
  width: 100px;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
}

.lamp-bulb {
  width: 84px;
  height: 84px;
  border-radius: 50%;
  background: #444;
  box-shadow: inset 0 -6px 12px rgba(0, 0, 0, 0.6);
  transition: background 0.45s ease, box-shadow 0.45s ease, transform 0.35s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* a simple filament decoration */
.filament {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.08) inset;
  opacity: 0.12;
  transition: opacity 0.45s ease, transform 0.45s ease;
}

.neck {
  width: 8px;
  height: 60px;
  background: #666;
  border-radius: 4px;
}
.base {
  width: 64px;
  height: 16px;
  background: #555;
  border-radius: 6px;
}

/* background glow area (covers right side) */
.glow {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 50%;
  pointer-events: none;
  transition: box-shadow 0.45s ease, opacity 0.45s ease;
  opacity: 0;
  z-index: 0;
}

/* Login form: initially hidden with opacity and pointer-events disabled */
.login-form {
  width: 100%;
  max-width: 360px;
  background: rgba(255, 255, 255, 0.04);
  padding: 28px;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
  text-align: center;
  transform: translateY(-8px) scale(0.995);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.2, 0.9, 0.2, 1);
  z-index: 2;
}

.login-form h2 {
  margin: 0 0 16px 0;
  color: #fff;
  font-size: 20px;
}
.login-form input {
  width: 100%;
  padding: 12px 14px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.06);
  background: rgba(0, 0, 0, 0.25);
  color: #fff;
  outline: none;
  font-size: 14px;
}
.login-form button {
  width: 100%;
  margin-top: 12px;
  padding: 12px 14px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #111;
  font-weight: 600;
  cursor: pointer;
}
.hint {
  font-size: 13px;
  margin-top: 10px;
  color: rgba(255, 255, 255, 0.65);
}

/* --- When checked: light ON --- */
/* Because checkbox is before .wrap, we use general sibling selector */
#switch:checked ~ .wrap .lamp-bulb {
  background: var(--accent);
  box-shadow: 0 0 60px 18px rgba(255, 213, 74, 0.12),
    0 0 28px 8px rgba(255, 213, 74, 0.18);
  transform: translateY(-4px) scale(1.02);
}
#switch:checked ~ .wrap .filament {
  opacity: 0.9;
  transform: scale(1.02);
  box-shadow: 0 0 30px rgba(255, 213, 74, 0.8);
  background: radial-gradient(
    circle at 30% 30%,
    rgba(255, 255, 255, 0.9),
    rgba(255, 213, 74, 0.8)
  );
}

/* big glow on right area */
#switch:checked ~ .wrap .glow {
  opacity: 1;
  box-shadow: -120px 0 220px 40px rgba(255, 213, 74, 0.12),
    -60px 0 120px 20px rgba(255, 213, 74, 0.08) inset;
}

/* show login form smoothly */
#switch:checked ~ .wrap .login-form {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0) scale(1);
}

/* optional small label under lamp */
.lamp-caption {
  margin-top: 10px;
  color: var(--muted);
  font-size: 13px;
  text-align: center;
  opacity: 0.9;
}

/* small responsive tweaks */
@media (max-width: 720px) {
  .wrap {
    flex-direction: column;
    height: auto;
    padding: 20px;
    gap: 18px;
  }
  .glow {
    display: none;
  }
  .lamp-label {
    width: 120px;
    height: 220px;
  }
}

</style>
<script>
    (function () {
  const label = document.querySelector(".lamp-label");
  const checkbox = document.getElementById("switch");
  label.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      checkbox.checked = !checkbox.checked;
      checkbox.dispatchEvent(new Event("change", { bubbles: true }));
    }
  });
})();

</script>
