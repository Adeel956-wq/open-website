<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Vault</title>

<style>
*{
  margin:0;padding:0;box-sizing:border-box;
  font-family:Inter,system-ui,sans-serif
}
body{
  height:100vh;
  background:radial-gradient(circle at top,#1e293b,#020617);
  display:flex;color:#e5e7eb
}
.sidebar{
  width:220px;
  background:#020617;
  border-right:1px solid #1e293b;
  padding:22px;
}
.logo{
  font-size:20px;font-weight:700;
  margin-bottom:30px;
}
.nav button{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  background:#020617;
  border:1px solid #1e293b;
  color:#c7d2fe;
  border-radius:12px;
  cursor:pointer;
}
.nav button.active,
.nav button:hover{
  background:linear-gradient(135deg,#22d3ee,#6366f1);
  color:#020617;font-weight:700;
}
.main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}
.panel{
  width:420px;
  background:rgba(2,6,23,.9);
  border:1px solid #1e293b;
  border-radius:22px;
  padding:28px;
}
h1{font-size:22px;margin-bottom:6px}
p{font-size:13px;color:#94a3b8;margin-bottom:22px}

.card{
  background:#020617;
  border:1px solid #1e293b;
  border-radius:14px;
  padding:16px;
  margin-bottom:16px
}
label{
  font-size:12px;color:#94a3b8;
  margin-bottom:6px;display:block
}
input{
  width:100%;padding:12px;
  background:#020617;
  border:1px solid #1e293b;
  border-radius:10px;
  color:#e5e7eb
}
button.action{
  width:100%;padding:15px;
  border:none;border-radius:14px;
  background:linear-gradient(135deg,#22d3ee,#6366f1);
  color:#020617;font-weight:800;
  cursor:pointer
}
.status{
  margin-top:14px;font-size:13px;
  min-height:18px
}
.hidden{display:none}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">🔐 SecureVault</div>
  <div class="nav">
    <button class="active" onclick="show('encrypt')">Encrypt</button>
    <button onclick="show('decrypt')">Decrypt</button>
  </div>
</div>

<div class="main">

<!-- ENCRYPT -->
<div class="panel" id="encrypt">
  <h1>Encrypt File</h1>
  <p>Encrypt file with metadata protection.</p>

  <div class="card">
    <label>Select File</label>
    <input type="file" id="eFile">
  </div>

  <div class="card">
    <label>Password (12+ chars)</label>
    <input type="password" id="ePass">
  </div>

  <button class="action" onclick="encrypt()">Encrypt & Download</button>
  <div class="status" id="eStatus"></div>
</div>

<!-- DECRYPT -->
<div class="panel hidden" id="decrypt">
  <h1>Decrypt File</h1>
  <p>Restore using original password.</p>

  <div class="card">
    <label>Encrypted File (.enc)</label>
    <input type="file" id="dFile">
  </div>

  <div class="card">
    <label>Password</label>
    <input type="password" id="dPass">
  </div>

  <button class="action" onclick="decrypt()">Decrypt & Download</button>
  <div class="status" id="dStatus"></div>
</div>

</div>

<script>
function show(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.add('hidden'))
  document.getElementById(id).classList.remove('hidden')
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'))
  event.target.classList.add('active')
}

async function encrypt(){
  const f=document.getElementById("eFile").files[0]
  const p=document.getElementById("ePass").value
  const s=document.getElementById("eStatus")
  if(!f||!p){s.textContent="❌ Missing file or password";return}
  if(p.length<12){s.textContent="⚠️ Password too short (12+ required)";return}

  s.textContent="Encrypting..."

  try{
    const buf=await f.arrayBuffer()
    const enc=new TextEncoder()

    const salt=crypto.getRandomValues(new Uint8Array(16))
    const iv=crypto.getRandomValues(new Uint8Array(12))

    const keyMat=await crypto.subtle.importKey(
      "raw",enc.encode(p),"PBKDF2",false,["deriveKey"]
    )
    const key=await crypto.subtle.deriveKey(
      {name:"PBKDF2",salt,iterations:2000000,hash:"SHA-256"},
      keyMat,{name:"AES-GCM",length:256},false,["encrypt"]
    )

    const meta=enc.encode(JSON.stringify({name:f.name,type:f.type}))
    const metaLen=new Uint32Array([meta.length])

    const plaintext=new Uint8Array(4+meta.length+buf.byteLength)
    plaintext.set(new Uint8Array(metaLen.buffer),0)
    plaintext.set(meta,4)
    plaintext.set(new Uint8Array(buf),4+meta.length)

    const ciphertext=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,plaintext)

    const header=new Uint8Array(1+salt.length+iv.length)
    header[0]=1
    header.set(salt,1)
    header.set(iv,17)

    const blob=new Blob([header,new Uint8Array(ciphertext)])
    const a=document.createElement("a")
    a.href=URL.createObjectURL(blob)
    a.download=f.name+".enc"
    a.click()

    s.textContent="✅ Encrypted successfully"
  }catch(e){
    console.error(e)
    s.textContent="❌ Encryption failed"
  }
}

async function decrypt(){
  const f=document.getElementById("dFile").files[0]
  const p=document.getElementById("dPass").value
  const s=document.getElementById("dStatus")
  if(!f||!p){s.textContent="❌ Missing file or password";return}
  s.textContent="Decrypting..."

  try{
    const buf=new Uint8Array(await f.arrayBuffer())
    if(buf.length<29) throw "invalid file"

    const salt=buf.slice(1,17)
    const iv=buf.slice(17,29)
    const ciphertext=buf.slice(29)

    const enc=new TextEncoder()
    const dec=new TextDecoder()

    const keyMat=await crypto.subtle.importKey(
      "raw",enc.encode(p),"PBKDF2",false,["deriveKey"]
    )
    const key=await crypto.subtle.deriveKey(
      {name:"PBKDF2",salt,iterations:2000000,hash:"SHA-256"},
      keyMat,{name:"AES-GCM",length:256},false,["decrypt"]
    )

    const plaintext=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ciphertext)
    const data=new Uint8Array(plaintext)

    const metaLen=new DataView(data.buffer).getUint32(0,true)
    const metaBuf=data.slice(4,4+metaLen)
    const meta=JSON.parse(dec.decode(metaBuf))
    const fileData=data.slice(4+metaLen)

    const blob=new Blob([fileData],{type:meta.type})
    const a=document.createElement("a")
    a.href=URL.createObjectURL(blob)
    a.download=meta.name
    a.click()

    s.textContent="✅ Decrypted successfully"
  }catch(e){
    console.error(e)
    s.textContent="❌ Decryption failed"
  }
}
</script>
</body>
</html>
